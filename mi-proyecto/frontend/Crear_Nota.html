<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevForum - Crear Nota</title>
    <link rel="stylesheet" href="CSS/CrearNotas.css">
</head>
<body>

    <h2>Crear Nueva Nota</h2>
    
    <form class="note-form">
        <div class="form-group">
            <label for="title">Título</label>
            <input type="text" id="title" placeholder="Ej. Recordatorio importante">
        </div>
        
        <div class="form-group">
            <label for="content">Contenido</label>
            <textarea id="content" placeholder="Escribe aquí el contenido de tu nota..."></textarea>
        </div>
        
        <div class="form-actions">
            <button type="button" class="btn-cancel">Cancelar</button>
            <a href="CreacionDeNotas.html"><button type="submit" class="btn-save">Guardar Nota</button></a>
        </div>
    </form>
</body>
</html
